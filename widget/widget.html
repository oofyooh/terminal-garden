<link rel="stylesheet" href="widget.css">

<div id="terminal-garden" class="terminal-garden">
  <section class="terminal-shell" aria-label="Terminal Garden contribution goal">
    <header class="terminal-header">
      <div class="terminal-brand">
        <span class="status-light" aria-hidden="true"></span>
        <span class="terminal-title">TERMINAL GARDEN</span>
      </div>

      <span class="terminal-status">ONLINE</span>
    </header>

    <div class="terminal-screen">
      <div class="goal-panel">
        <p id="goal-label" class="goal-label">ACTIVE GOAL</p>

        <h1 id="goal-name" class="goal-name">
          Wacom MovInk Pad Pro 14
        </h1>

        <div
          id="progress-track"
          class="progress-track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="1400"
          aria-valuenow="0"
          aria-label="Goal progress"
        >
          <div id="progress-fill" class="progress-fill"></div>
          <div class="progress-grid" aria-hidden="true"></div>
        </div>

        <div class="progress-readout">
          <span id="progress-percent" class="progress-percent">0%</span>

          <span id="progress-money" class="progress-money">
            $0.00 / $1,400.00
          </span>
        </div>

        <p id="activity-message" class="activity-message">
          SYSTEM READY — WAITING FOR NEW CONTRIBUTIONS
        </p>
      </div>

      <aside class="mascot-panel" aria-label="Sleeping cat mascot">
        <div id="cat-mascot" class="cat-mascot">
          <div class="cat-ears" aria-hidden="true">
            <span class="cat-ear cat-ear-left"></span>
            <span class="cat-ear cat-ear-right"></span>
          </div>

          <div class="cat-head">
            <span class="cat-eye cat-eye-visible"></span>
            <span class="cat-eye cat-eye-patch"></span>
            <span class="cat-nose"></span>
          </div>

          <div class="cat-body"></div>
          <div class="cat-tail"></div>

          <span class="sleep-indicator">z z z</span>
        </div>
      </aside>

      <div class="crt-reflection" aria-hidden="true"></div>
      <div class="crt-scanlines" aria-hidden="true"></div>
      <div class="crt-vignette" aria-hidden="true"></div>
    </div>
  </section>
</div>

<script src="widget.js"></script>
